<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Code — Sol do Recreio</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f4f1ea;
      --fg: #1a1a1a;
      --accent: #c45c26;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --fg: #f4f1ea;
        --accent: #e8a077;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--bg);
      color: var(--fg);
    }
    h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 0.25rem; }
    .sub { opacity: 0.85; font-size: 0.9rem; margin-bottom: 1.25rem; text-align: center; max-width: 28rem; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; text-align: left; width: 100%; max-width: 420px; }
    input[type="url"] {
      width: 100%;
      max-width: 420px;
      padding: 0.6rem 0.75rem;
      font-size: 1rem;
      border: 1px solid color-mix(in srgb, var(--fg) 25%, transparent);
      border-radius: 8px;
      background: color-mix(in srgb, var(--bg) 92%, var(--fg));
      color: var(--fg);
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      margin: 0.75rem 0 1rem;
      max-width: 420px;
      width: 100%;
    }
    button {
      cursor: pointer;
      padding: 0.55rem 1rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    button:hover { filter: brightness(1.08); }
    button.secondary {
      background: color-mix(in srgb, var(--fg) 15%, transparent);
      color: var(--fg);
    }
    #qrcode {
      display: inline-block;
      padding: 1rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px color-mix(in srgb, var(--fg) 12%, transparent);
    }
    #qrcode img { display: block; }
    .hint { font-size: 0.75rem; opacity: 0.7; margin-top: 1.25rem; max-width: 360px; text-align: center; }
  </style>
</head>
<body>
  <h1>Sol do Recreio</h1>
  <p class="sub">QR code que abre o site no telemóvel. Altere o endereço abaixo se mudar de domínio.</p>

  <label for="url">URL do site (com https://)</label>
  <input id="url" type="url" inputmode="url" autocomplete="url" spellcheck="false" />

  <div class="row">
    <button type="button" id="regen">Atualizar QR code</button>
    <button type="button" id="copy" class="secondary">Copiar URL</button>
  </div>

  <div id="qrcode" aria-live="polite"></div>

  <p class="hint">
    Ficheiro fora do Next.js: abra este HTML no browser (duplo clique ou arrastar para o Chrome).
    Teste com a câmara do telemóvel ou a app de leitura de QR.
  </p>

  <!-- QRCode.js — David Shim, MIT -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" crossorigin="anonymous"></script>
  <script>
    (function () {
      /** Troque aqui o site por defeito (produção Hostinger). */
      var DEFAULT_SITE = "https://skyblue-lark-202006.hostingersite.com/";

      var input = document.getElementById("url");
      var mount = document.getElementById("qrcode");
      var qr = null;

      function normalizeUrl(raw) {
        var s = (raw || "").trim();
        if (!s) return DEFAULT_SITE;
        if (!/^https?:\/\//i.test(s)) s = "https://" + s;
        try {
          var u = new URL(s);
          return u.toString();
        } catch (e) {
          return DEFAULT_SITE;
        }
      }

      function readQueryUrl() {
        var params = new URLSearchParams(window.location.search);
        var q = params.get("url");
        return q ? normalizeUrl(q) : null;
      }

      function render() {
        var text = normalizeUrl(input.value);
        input.value = text;
        mount.innerHTML = "";
        qr = new QRCode(mount, {
          text: text,
          width: 256,
          height: 256,
          colorDark: "#1a1a1a",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M,
        });
      }

      var fromQuery = readQueryUrl();
      input.value = fromQuery || DEFAULT_SITE;

      document.getElementById("regen").addEventListener("click", render);
      input.addEventListener("change", render);
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          render();
        }
      });

      document.getElementById("copy").addEventListener("click", function () {
        var t = normalizeUrl(input.value);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(t).catch(function () {
            window.prompt("Copie a URL:", t);
          });
        } else {
          window.prompt("Copie a URL:", t);
        }
      });

      if (typeof QRCode === "undefined") {
        mount.textContent = "Não foi possível carregar a biblioteca de QR (ligue a internet ou verifique o bloqueio de scripts).";
      } else {
        render();
      }
    })();
  </script>
</body>
</html>
